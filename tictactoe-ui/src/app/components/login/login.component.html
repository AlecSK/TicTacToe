<div class="login-page">
  <div class="login-card">
    <h1 class="title">Крестики-нолики</h1>
    <p class="subtitle">Введи свой никнейм чтобы начать</p>

    <form (ngSubmit)="login()" class="login-form">
      <input
        type="text"
        class="input"
        placeholder="Никнейм"
        [(ngModel)]="nickname"
        name="nickname"
        maxlength="50"
        autocomplete="off"
        [disabled]="loading"
      />

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading || !nickname.trim()"
      >
        {{ loading ? 'Загрузка...' : 'Войти' }}
      </button>
    </form>
  </div>
</div>
